  /tx/submit:
    post:
      tags:
      - Cardano » Transactions
      summary: Submit a transaction
      description: "Submit an already serialized transaction to the network.\n\n<p>\n  <span class=\"hosted\">Hosted</span> Endpoint only available for hosted variant.\n</p>\n"
      x-codeSamples:
      - lang: Shell
        label: cURL
        source: "# Assuming `data` is a serialized transaction on the file-system.\ncurl \"https://cardano-mainnet.blockfrost.io/api/v0/tx/submit\" \\\n  -X POST \\\n  -H \"Content-Type: application/cbor\" \\\n  -H \"project_id: $PROJECT_ID\" \\\n  --data-binary @./data\n"
      - lang: Shell
        label: cardano-cli
        source: "# Assuming `tx.signed` is signed transaction constructed by cardano-cli\nxxd -r -p <<< $(jq .cborHex tx.signed) > tx.submit-api.raw\ncurl \"https://cardano-mainnet.blockfrost.io/api/v0/tx/submit\" \\\n  -X POST \\\n  -H \"Content-Type: application/cbor\" \\\n  -H \"project_id: $PROJECT_ID\" \\\n  --data-binary @./tx.submit-api.raw\n"
      requestBody:
        description: 'The transaction to submit, serialized in CBOR.

          '
        required: true
        content:
          application/cbor:
            schema:
              type: string
              description: 'The transaction to submit, serialized in CBOR.

                '
            example: '

              '
      responses:
        '200':
          description: Return the ID of the submitted transaction.
          content:
            application/json:
              schema:
                type: string
                format: hex
                minLength: 64
                maxLength: 64
                example: d1662b24fa9fe985fc2dce47455df399cb2e31e1e1819339e885801cc3578908
        '400':
          $ref: '#/components/responses/400'
        '403':
          $ref: '#/components/responses/403'
        '404':
          $ref: '#/components/responses/404'
        '418':
          $ref: '#/components/responses/418'
        '425':
          $ref: '#/components/responses/425'
        '429':
          $ref: '#/components/responses/429'
        '500':
          $ref: '#/components/responses/500'
components:
  schemas:
    tx_content_metadata_cbor:
      type: array
      items:
        type: object
        properties:
          label:
            type: string
            description: Metadata label
          cbor_metadata:
            deprecated: true
            type: string
            nullable: true
            description: Content of the CBOR metadata
          metadata:
            type: string
            nullable: true
            description: Content of the CBOR metadata in hex
        required:
        - label
        - cbor_metadata
        - metadata
      example:
      - label: '1968'
        cbor_metadata: \xa100a16b436f6d62696e6174696f6e8601010101010c
        metadata: a100a16b436f6d62696e6174696f6e8601010101010c
    tx_content_redeemers:
      type: array
      items:
        type: object
        properties:
          tx_index:
            type: integer
            example: 0
            description: Index of the redeemer within the transaction
          purpose:
            type: string
            enum:
            - spend
            - mint
            - cert
            - reward
            example: spend
            description: Validation purpose
          script_hash:
            type: string
            example: ec26b89af41bef0f7585353831cb5da42b5b37185e0c8a526143b824
            description: Script hash
          redeemer_data_hash:
            type: string
            example: 923918e403bf43c34b4ef6b48eb2ee04babed17320d8d1b9ff9ad086e86f44ec
            description: Redeemer data hash
          datum_hash:
            type: string
            example: 923918e403bf43c34b4ef6b48eb2ee04babed17320d8d1b9ff9ad086e86f44ec
            deprecated: true
            description: Datum hash
          unit_mem:
            type: string
            example: '1700'
            description: The budget in Memory to run a script
          unit_steps:
            type: string
            example: '476468'
            description: The budget in CPU steps to run a script
          fee:
            type: string
            example: '172033'
            description: The fee consumed to run the script
        required:
        - tx_index
        - purpose
        - unit_mem
        - unit_steps
        - script_hash
        - redeemer_data_hash
        - datum_hash
        - fee
    tx_content_utxo:
      type: object
      properties:
        hash:
          type: string
          example: 1e043f100dce12d107f679685acd2fc0610e10f72a92d412794c9773d11d8477
          description: Transaction hash
        inputs:
          type: array
          items:
            type: object
            properties:
              address:
                type: string
                example: addr1q9ld26v2lv8wvrxxmvg90pn8n8n5k6tdst06q2s856rwmvnueldzuuqmnsye359fqrk8hwvenjnqultn7djtrlft7jnq7dy7wv
                description: Input address
              amount:
                type: array
                items:
                  type: object
                  description: The sum of all the UTXO per asset
                  properties:
                    unit:
                      type: string
                      format: Lovelace or concatenation of asset policy_id and hex-encoded asset_name
                      description: The unit of the value
                    quantity:
                      type: string
                      description: The quantity of the unit
                  required:
                  - unit
                  - quantity
                example:
                - unit: lovelace
                  quantity: '42000000'
                - unit: b0d07d45fe9514f80213f4020e5a61241458be626841cde717cb38a76e7574636f696e
                  quantity: '12'
              tx_hash:
                type: string
                example: 1a0570af966fb355a7160e4f82d5a80b8681b7955f5d44bec0dce628516157f0
                description: Hash of the UTXO transaction
              output_index:
                type: integer
                example: 0
                description: UTXO index in the transaction
              data_hash:
                type: string
                nullable: true
                description: The hash of the transaction output datum
                example: 9e478573ab81ea7a8e31891ce0648b81229f408d596a3483e6f4f9b92d3cf710
              inline_datum:
                type: string
                nullable: true
                description: CBOR encoded inline datum
                example: 19a6aa
              reference_script_hash:
                type: string
                nullable: true
                description: The hash of the reference script of the input
                example: 13a3efd825703a352a8f71f4e2758d08c28c564e8dfcce9f77776ad1
              collateral:
                type: boolean
                example: false
                description: Whether the input is a collateral consumed on script validation failure
              reference:
                type: boolean
                example: false
                description: Whether the input is a reference transaction input
            required:
            - address
            - amount
            - tx_hash
            - output_index
            - data_hash
            - inline_datum
            - reference_script_hash
            - collateral
        outputs:
          type: array
          items:
            type: object
            properties:
              address:
                type: string
                example: addr1q9ld26v2lv8wvrxxmvg90pn8n8n5k6tdst06q2s856rwmvnueldzuuqmnsye359fqrk8hwvenjnqultn7djtrlft7jnq7dy7wv
                description: Output address
              amount:
                type: array
                items:
                  type: object
                  description: The sum of all the UTXO per asset
                  properties:
                    unit:
                      type: string
                      format: Lovelace or concatenation of asset policy_id and hex-encoded asset_name
                      description: The unit of the value
                    quantity:
                      type: string
                      description: The quantity of the unit
                  required:
                  - unit
                  - quantity
                example:
                - unit: lovelace
                  quantity: '42000000'
                - unit: b0d07d45fe9514f80213f4020e5a61241458be626841cde717cb38a76e7574636f696e
                  quantity: '12'
              output_index:
                type: integer
                example: 0
                description: UTXO index in the transaction
              data_hash:
                type: string
                nullable: true
                description: The hash of the transaction output datum
                example: 9e478573ab81ea7a8e31891ce0648b81229f408d596a3483e6f4f9b92d3cf710
              inline_datum:
                type: string
                nullable: true
                description: CBOR encoded inline datum
                example: 19a6aa
              collateral:
                type: boolean
                example: false
                description: Whether the output is a collateral output
              reference_script_hash:
                type: string
                nullable: true
                description: The hash of the reference script of the output
                example: 13a3efd825703a352a8f71f4e2758d08c28c564e8dfcce9f77776ad1
              consumed_by_tx:
                type: string
                nullable: true
                description: Transaction hash that consumed the UTXO or null for unconsumed UTXOs. Always null for collateral outputs.
                example: 66c29b56952f6085afac3b0632d781af78d020b080063bcfd6c54b8e2b8fed41
            required:
            - address
            - amount
            - output_index
            - data_hash
            - inline_datum
            - collateral
            - reference_script_hash
      required:
      - hash
      - inputs
      - outputs
    tx_content_pool_retires:
      type: array
      items:
        type: object
        properties:
          cert_index:
            type: integer
            example: 0
            description: Index of the certificate within the transaction
          pool_id:
            type: string
            example: pool1pu5jlj4q9w9jlxeu370a3c9myx47md5j5m2str0naunn2q3lkdy
            description: Bech32 stake pool ID
          retiring_epoch:
            type: integer
            example: 216
            description: Epoch in which the pool becomes retired
        required:
        - cert_index
        - pool_id
        - retiring_epoch
    tx_content_delegations:
      type: array
      items:
        type: object
        properties:
          index:
            type: integer
            example: 0
            description: Index of the certificate within the transaction
            deprecated: true
          cert_index:
            type: integer
            example: 0
            description: Index of the certificate within the transaction
          address:
            type: string
            example: stake1u9r76ypf5fskppa0cmttas05cgcswrttn6jrq4yd7jpdnvc7gt0yc
            description: Bech32 delegation stake address
          pool_id:
            type: string
            example: pool1pu5jlj4q9w9jlxeu370a3c9myx47md5j5m2str0naunn2q3lkdy
            description: Bech32 ID of delegated stake pool
          active_epoch:
            type: integer
            example: 210
            description: Epoch in which the delegation becomes active
        required:
        - index
        - cert_index
        - address
        - pool_id
        - active_epoch
    tx_content_mirs:
      type: array
      items:
        type: object
        properties:
          pot:
            type: string
            enum:
            - reserve
            - treasury
            example: reserve
            description: Source of MIR funds
          cert_index:
            type: integer
            example: 0
            description: Index of the certificate within the transaction
          address:
            type: string
            example: stake1u9r76ypf5fskppa0cmttas05cgcswrttn6jrq4yd7jpdnvc7gt0yc
            description: Bech32 stake address
          amount:
            type: string
            example: '431833601'
            description: MIR amount in Lovelaces
        required:
        - pot
        - cert_index
        - address
        - amount
    tx_content_stake_addr:
      type: array
      items:
        type: object
        properties:
          cert_index:
            type: integer
            example: 0
            description: Index of the certificate within the transaction
          address:
            type: string
            example: stake1u9t3a0tcwune5xrnfjg4q7cpvjlgx9lcv0cuqf5mhfjwrvcwrulda
            description: Delegation stake address
          registration:
            type: boolean
            example: true
            description: Registration boolean, false if deregistration
        required:
        - cert_index
        - address
        - registration
    tx_content_withdrawals:
      type: array
      items:
        type: object
        properties:
          address:
            type: string
            example: stake1u9r76ypf5fskppa0cmttas05cgcswrttn6jrq4yd7jpdnvc7gt0yc
            description: Bech32 withdrawal address
          amount:
            type: string
            example: '431833601'
            description: Withdrawal amount in Lovelaces
        required:
        - address
        - amount
    tx_content_pool_certs:
      type: array
      items:
        type: object
        properties:
          cert_index:
            type: integer
            example: 0
            description: Index of the certificate within the transaction
          pool_id:
            type: string
            example: pool1pu5jlj4q9w9jlxeu370a3c9myx47md5j5m2str0naunn2q3lkdy
            description: Bech32 encoded pool ID
          vrf_key:
            type: string
            example: 0b5245f9934ec2151116fb8ec00f35fd00e0aa3b075c4ed12cce440f999d8233
            description: VRF key hash
          pledge:
            type: string
            example: '5000000000'
            description: Stake pool certificate pledge in Lovelaces
          margin_cost:
            type: number
            example: 0.05
            description: Margin tax cost of the stake pool
          fixed_cost:
            type: string
            example: '340000000'
            description: Fixed tax cost of the stake pool in Lovelaces
          reward_account:
            type: string
            example: stake1uxkptsa4lkr55jleztw43t37vgdn88l6ghclfwuxld2eykgpgvg3f
            description: Bech32 reward account of the stake pool
          owners:
            type: array
            items:
              type: string
              description: Bech32 accounts of the pool owners
            example:
            - stake1u98nnlkvkk23vtvf9273uq7cph5ww6u2yq2389psuqet90sv4xv9v
          metadata:
            type: object
            nullable: true
            properties:
              url:
                type: string
                nullable: true
                example: https://stakenuts.com/mainnet.json
                description: URL to the stake pool metadata
              hash:
                type: string
                nullable: true
                example: 47c0c68cb57f4a5b4a87bad896fc274678e7aea98e200fa14a1cb40c0cab1d8c
                description: Hash of the metadata file
              ticker:
                type: string
                nullable: true
                example: NUTS
                description: Ticker of the stake pool
              name:
                type: string
                nullable: true
                example: Stake Nuts
                description: Name of the stake pool
              description:
                type: string
                nullable: true
                example: The best pool ever
                description: Description of the stake pool
              homepage:
                type: string
                nullable: true
                example: https://stakentus.com/
                description: Home page of the stake pool
            required:
            - url
            - hash
            - ticker
            - name
            - description
            - homepage
          relays:
            type: array
            items:
              type: object
              properties:
                ipv4:
                  type: string
                  nullable: true
                  example: 4.4.4.4
                  description: IPv4 address of the relay
                ipv6:
                  type: string
                  nullable: true
                  example: https://stakenuts.com/mainnet.json
                  description: IPv6 address of the relay
                dns:
                  type: string
                  nullable: true
                  example: relay1.stakenuts.com
                  description: DNS name of the relay
                dns_srv:
                  type: string
                  nullable: true
                  example: _relays._tcp.relays.stakenuts.com
                  description: DNS SRV entry of the relay
                port:
                  type: integer
                  example: 3001
                  description: Network port of the relay
              required:
              - ipv4
              - ipv6
              - dns
              - dns_srv
              - port
          active_epoch:
            type: integer
            example: 210
            description: Epoch in which the update becomes active
        required:
        - cert_index
        - pool_id
        - vrf_key
        - pledge
        - margin_cost
        - fixed_cost
        - reward_account
        - owners
        - metadata
        - relays
        - active_epoch
    tx_content_required_signers:
      type: array
      items:
        type: object
        properties:
          witness_hash:
            type: string
            example: d52e11f3e48436dd42dbec6d88c239732e503b8b7a32af58e5f87625
            description: Hash of the witness
        required:
        - witness_hash
    tx_content:
      type: object
      properties:
        hash:
          type: string
          example: 1e043f100dce12d107f679685acd2fc0610e10f72a92d412794c9773d11d8477
          description: Transaction hash
        block:
          type: string
          example: 356b7d7dbb696ccd12775c016941057a9dc70898d87a63fc752271bb46856940
          description: Block hash
        block_height:
          type: integer
          example: 123456
          description: Block number
        block_time:
          type: integer
          example: 1635505891
          description: Block creation time in UNIX time
        slot:
          type: integer
          example: 42000000
          description: Slot number
        index:
          type: integer
          example: 1
          description: Transaction index within the block
        output_amount:
          type: array
          items:
            type: object
            description: The sum of all the UTXO per asset
            properties:
              unit:
                type: string
                format: Lovelace or concatenation of asset policy_id and hex-encoded asset_name
                description: The unit of the value
              quantity:
                type: string
                description: The quantity of the unit
            required:
            - unit
            - quantity
          example:
          - unit: lovelace
            quantity: '42000000'
          - unit: b0d07d45fe9514f80213f4020e5a61241458be626841cde717cb38a76e7574636f696e
            quantity: '12'
        fees:
          type: string
          example: '182485'
          description: Fees of the transaction in Lovelaces
        deposit:
          type: string
          example: '0'
          description: Deposit within the transaction in Lovelaces
        size:
          type: integer
          example: 433
          description: Size of the transaction in Bytes
        invalid_before:
          type: string
          nullable: true
          example: null
          description: Left (included) endpoint of the timelock validity intervals
        invalid_hereafter:
          type: string
          nullable: true
          example: '13885913'
          description: Right (excluded) endpoint of the timelock validity intervals
        utxo_count:
          type: integer
          example: 4
          description: Count of UTXOs within the transaction
        withdrawal_count:
          type: integer
          example: 0
          description: Count of the withdrawals within the transaction
        mir_cert_count:
          type: integer
          example: 0
          description: Count of the MIR certificates within the transaction
        delegation_count:
          type: integer
          example: 0
          description: Count of the delegations within the transaction
        stake_cert_count:
          type: integer
          example: 0
          description: Count of the stake keys (de)registration within the transaction
        pool_update_count:
          type: integer
          example: 0
          description: Count of the stake pool registration and update certificates within the transaction
        pool_retire_count:
          type: integer
          example: 0
          description: Count of the stake pool retirement certificates within the transaction
        asset_mint_or_burn_count:
          type: integer
          example: 0
          description: Count of asset mints and burns within the transaction
        redeemer_count:
          type: integer
          example: 0
          description: Count of redeemers within the transaction
        valid_contract:
          type: boolean
          example: true
          description: True if contract script passed validation
        treasury_donation:
          type: string
          example: '0'
          description: Treasury donation in Lovelaces
      required:
      - hash
      - block
      - block_height
      - block_time
      - slot
      - index
      - output_amount
      - fees
      - deposit
      - size
      - invalid_before
      - invalid_hereafter
      - utxo_count
      - withdrawal_count
      - mir_cert_count
      - delegation_count
      - stake_cert_count
      - pool_update_count
      - pool_retire_count
      - asset_mint_or_burn_count
      - redeemer_count
      - valid_contract
      - treasury_donation
    tx_content_metadata:
      type: array
      items:
        type: object
        properties:
          label:
            type: string
            description: Metadata label
          json_metadata:
            oneOf:
            - type: string
            - type: object
              additionalProperties: true
            description: Content of the metadata
        required:
        - label
        - json_metadata
      example:
      - label: '1967'
        json_metadata:
          metadata: https://nut.link/metadata.json
          hash: 6bf124f217d0e5a0a8adb1dbd8540e1334280d49ab861127868339f43b3948af
      - label: '1968'
        json_metadata:
          ADAUSD:
          - value: '0.10409800535729975'
            source: ergoOracles
    tx_content_cbor:
      type: object
      properties:
        cbor:
          type: string
          description: CBOR serialized transaction
      required:
      - cbor
      example:
        cbor: 
  responses:
    '400':
      description: Bad request
      content:
        application/json:
          schema:
            type: object
            properties:
              status_code:
                type: integer
                example: 400
              error:
                type: string
                example: Bad Request
              message:
                type: string
                example: Backend did not understand your request.
            required:
            - error
            - message
            - status_code
    '425':
      description: Mempool is already full, not accepting new txs straight away
      content:
        application/json:
          schema:
            type: object
            properties:
              status_code:
                type: integer
                example: 425
              error:
                type: string
                example: Mempool Full
              message:
                type: string
                example: Mempool is full, please try resubmitting again later.
            required:
            - error
            - message
            - status_code
    '429':
      description: Usage limit reached
      content:
        application/json:
          schema:
            type: object
            properties:
              status_code:
                type: integer
                example: 429
              error:
                type: string
                example: Project Over Limit
              message:
                type: string
                example: Usage is over limit.
            required:
            - error
            - message
            - status_code
    '403':
      description: Authentication secret is missing or invalid
      content:
        application/json:
          schema:
            type: object
            properties:
              status_code:
                type: integer
                example: 403
              error:
                type: string
                example: Forbidden
              message:
                type: string
                example: Invalid project token.
            required:
            - error
            - message
            - status_code
    '500':
      description: Internal Server Error
      content:
        application/json:
          schema:
            type: object
            properties:
              status_code:
                type: integer
                example: 500
              error:
                type: string
                example: Internal Server Error
              message:
                type: string
                example: An unexpected response was received from the backend.
            required:
            - error
            - message
            - status_code
    '404':
      description: Component not found
      content:
        application/json:
          schema:
            type: object
            properties:
              status_code:
                type: integer
                example: 404
              error:
                type: string
                example: Not Found
              message:
                type: string
                example: The requested component has not been found.
            required:
            - error
            - message
            - status_code
    '418':
      description: IP has been auto-banned for extensive sending of requests after usage limit has been reached
      content:
        application/json:
          schema:
            type: object
            properties:
              status_code:
                type: integer
                example: 418
              error:
                type: string
                example: Requested Banned
              message:
                type: string
                example: IP has been auto-banned for flooding.
            required:
            - error
            - message
            - status_code
  securitySchemes:
    project_id:
      type: apiKey
      in: header
      name: project_id
      description: 'There are multiple token types available based on network you choose

        when creating a Blockfrost a project, for a list of token types

        see available networks.

        '
