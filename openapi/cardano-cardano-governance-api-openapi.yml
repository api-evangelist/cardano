    proposal_votes:
      type: array
      items:
        type: object
        properties:
          tx_hash:
            type: string
            description: Hash of the voting transaction.
          cert_index:
            type: integer
            description: Index of the certificate within the voting transaction.
          voter_role:
            type: string
            enum:
            - constitutional_committee
            - drep
            - spo
            description: The role of the voter. Can be one of constitutional_committee, drep, spo.
          voter:
            type: string
            description: The actual voter.
          vote:
            type: string
            enum:
            - 'yes'
            - 'no'
            - abstain
            description: The Vote. Can be one of yes, no, abstain.
        required:
        - tx_hash
        - cert_index
        - voter_role
        - voter
        - vote
      example:
      - tx_hash: b302de601defdf11a5261ed31a263804dac4a582a888c998ce24dec5
        cert_index: 2
        voter_role: drep
        voter: drep1mvdu8slennngja7w4un6knwezufra70887zuxpprd64jxfveahn
        vote: 'yes'
      - tx_hash: b302de601defdf11a5261ed31a263804dac4a582a888c998ce24dec5
        cert_index: 3
        voter_role: constitutional_committee
        voter: 53a42debdc7ffd90085ab7fd9800b63e6d1c9ac481ba6eb7b6a844e4
        vote: abstain
    drep_delegators:
      type: array
      items:
        type: object
        properties:
          address:
            type: string
            description: Bech32 encoded stake addresses
          amount:
            type: string
            description: Currently delegated amount
        required:
        - address
        - amount
      example:
      - address: stake1ux4vspfvwuus9uwyp5p3f0ky7a30jq5j80jxse0fr7pa56sgn8kha
        amount: '1137959159981411'
      - address: stake1uylayej7esmarzd4mk4aru37zh9yz0luj3g9fsvgpfaxulq564r5u
        amount: '16958865648'
      - address: stake1u8lr2pnrgf8f7vrs9lt79hc3sxm8s2w4rwvgpncks3axx6q93d4ck
        amount: '18605647'
  responses:
    '400':
      description: Bad request
      content:
        application/json:
          schema:
            type: object
            properties:
              status_code:
                type: integer
                example: 400
              error:
                type: string
                example: Bad Request
              message:
                type: string
                example: Backend did not understand your request.
            required:
            - error
            - message
            - status_code
    '429':
      description: Usage limit reached
      content:
        application/json:
          schema:
            type: object
            properties:
              status_code:
                type: integer
                example: 429
              error:
                type: string
                example: Project Over Limit
              message:
                type: string
                example: Usage is over limit.
            required:
            - error
            - message
            - status_code
    '403':
      description: Authentication secret is missing or invalid
      content:
        application/json:
          schema:
            type: object
            properties:
              status_code:
                type: integer
                example: 403
              error:
                type: string
                example: Forbidden
              message:
                type: string
                example: Invalid project token.
            required:
            - error
            - message
            - status_code
    '500':
      description: Internal Server Error
      content:
        application/json:
          schema:
            type: object
            properties:
              status_code:
                type: integer
                example: 500
              error:
                type: string
                example: Internal Server Error
              message:
                type: string
                example: An unexpected response was received from the backend.
            required:
            - error
            - message
            - status_code
    '404':
      description: Component not found
      content:
        application/json:
          schema:
            type: object
            properties:
              status_code:
                type: integer
                example: 404
              error:
                type: string
                example: Not Found
              message:
                type: string
                example: The requested component has not been found.
            required:
            - error
            - message
            - status_code
    '418':
      description: IP has been auto-banned for extensive sending of requests after usage limit has been reached
      content:
        application/json:
          schema:
            type: object
            properties:
              status_code:
                type: integer
                example: 418
              error:
                type: string
                example: Requested Banned
              message:
                type: string
                example: IP has been auto-banned for flooding.
            required:
            - error
            - message
            - status_code
